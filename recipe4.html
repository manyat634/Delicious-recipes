  <section class="recipe">
    <img src="https://www.acouplecooks.com/wp-content/uploads/2021/06/Burrito-Bowl-053.jpg" alt="Burrito Bowl">
    <h2>Ingredients</h2>
    <ul>
      <li>Cooked rice</li>
      <li>Beans</li>
      <li>Grilled chicken or veggies</li>
      <li>Salsa & guacamole</li>
    </ul>

    <h2>Instructions</h2>
    <ol>
      <li>Layer rice, beans, and protein.</li>
      <li>Add salsa and guacamole.</li>
      <li>Serve in a bowl.</li>
    </ol>

    <p><strong>Prep Time:</strong> 30 minutes</p>
    <p><strong>Difficulty:</strong> Easy</p>
